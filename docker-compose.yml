version: '3.8'

services:
  spellbound:
    build: .
    container_name: spellbound_academy
    ports:
      - "8000:8000"
    volumes:
      - spellbound_data:/app/data
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - OPEN_BROWSER=false
    restart: unless-stopped

volumes:
  spellbound_data:
